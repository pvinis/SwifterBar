name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  SCHEME: SwifterBar
  PROJECT: SwifterBar.xcodeproj

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Import signing certificate
        if: env.DEVELOPER_ID_CERTIFICATE != ''
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          # Create temporary keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH

          # Import certificate
          echo "$DEVELOPER_ID_CERTIFICATE" | base64 --decode > $CERT_PATH
          security import $CERT_PATH -P "$DEVELOPER_ID_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain

      - name: Build
        run: |
          xcodebuild -project $PROJECT -scheme $SCHEME -configuration Release \
            MARKETING_VERSION=$VERSION \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -archivePath SwifterBar.xcarchive archive

      - name: Export .app
        run: |
          cp -R "SwifterBar.xcarchive/Products/Applications/SwifterBar.app" SwifterBar.app

      - name: Code sign
        if: env.DEVELOPER_ID_CERTIFICATE != ''
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
        run: |
          codesign --force --options runtime --deep \
            --sign "Developer ID Application: ${{ secrets.DEVELOPER_ID_NAME }}" \
            --timestamp SwifterBar.app

      - name: Create DMG
        run: |
          hdiutil create -volname "SwifterBar" -srcfolder SwifterBar.app \
            -ov -format UDZO "SwifterBar-$VERSION.dmg"

      - name: Notarize
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "SwifterBar-$VERSION.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "SwifterBar-$VERSION.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SwifterBar-${{ env.VERSION }}.dmg
          generate_release_notes: true
          draft: false
