name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build .app
        run: |
          xcodebuild -project SwifterBar.xcodeproj -scheme SwifterBar \
            -configuration Release build
